services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - bot_data:/data
    restart: unless-stopped

  # Nginx is only needed in webhook mode.
  # Comment out (or remove) when running in polling mode.
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    environment:
      # Set DOMAIN to your VPS hostname, e.g. "example.com"
      DOMAIN: ${DOMAIN}
    volumes:
      # nginx image auto-runs envsubst on *.conf.template files in /etc/nginx/templates/
      - ./docker/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - bot
    restart: unless-stopped
    profiles:
      - webhook

volumes:
  bot_data:
